# ============================================================================
# CAR RACE APPLICATION CONFIGURATION
# ============================================================================
# This file contains the main configuration for the Car Race application.
# For Confluent Cloud configuration, see application-confluent.properties
# ============================================================================

# Application Name
spring.application.name=carrace

# Server Configuration
server.port=8080

# ============================================================================
# DATABASE CONFIGURATION (H2 File-Based Database)
# ============================================================================
# H2 database stored in the /data folder for persistence across restarts.
# Database file: ./data/carracedb.mv.db
# For production, consider PostgreSQL, MySQL, etc.

spring.datasource.url=jdbc:h2:file:./data/carracedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# KAFKA CONFIGURATION - COMMON SETTINGS
# ============================================================================
# These settings apply when NOT using Confluent Cloud
# If you want to use Confluent Cloud, create application-confluent.properties
# and run with: java -jar carrace.jar --spring.profiles.active=confluent
# ============================================================================

# Topic Names - These will be created automatically in Confluent Cloud
kafka.topic.race-events=race-events
kafka.topic.bet-events=bet-events
kafka.topic.payout-events=payout-events
kafka.topic.leaderboard-updates=leaderboard-updates

# Consumer Group IDs
kafka.consumer.group.race-processor=race-processor-group
kafka.consumer.group.bet-processor=bet-processor-group
kafka.consumer.group.payout-processor=payout-processor-group

# Kafka Streams Application ID (must be unique)
kafka.streams.application-id=carrace-leaderboard-streams

# ============================================================================
# LOCAL KAFKA CONFIGURATION (for development without Confluent Cloud)
# ============================================================================
# Uncomment these if you're running Kafka locally (e.g., via Docker)
# Comment them out when using Confluent Cloud

