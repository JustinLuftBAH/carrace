#spring.kafka.consumer.properties.spring.json.trusted.packages=*
#spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
#spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ============================================================================
# WEBSOCKET CONFIGURATION
# ============================================================================
# WebSocket endpoint for real-time race updates
websocket.race.endpoint=/ws/race
# How often to send updates to clients (milliseconds)
websocket.update.interval=200

# ============================================================================
# RACE CONFIGURATION
# ============================================================================
# Finish line position
race.finish.position=1000
# Default payout multiplier for winning bets
race.payout.multiplier=2.0
# Number of cars per race
race.default.cars=4

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.com.carrace=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN

# ============================================================================
# ACTUATOR (Health Checks)
# ============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
