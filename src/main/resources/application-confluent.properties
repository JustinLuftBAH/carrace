# ============================================================================
# CONFLUENT CLOUD CONFIGURATION GUIDE
# ============================================================================
# This file shows you EXACTLY how to configure your app to use Confluent Cloud.
# Follow these steps carefully - they're designed for someone who's never 
# used Confluent Cloud before.
#
# To use this configuration:
# 1. Fill in your Confluent Cloud details below (see step-by-step guide)
# 2. Run the app with: java -jar target/carrace-1.0.0.jar --spring.profiles.active=confluent
#    OR set environment variable: SPRING_PROFILES_ACTIVE=confluent
# ============================================================================

# ============================================================================
# STEP 1: CREATE A CONFLUENT CLOUD ACCOUNT
# ============================================================================
# 1. Go to https://confluent.cloud/
# 2. Click "Start Free" (you get $400 in free credits)
# 3. Sign up with your email
# 4. Verify your email address
# 5. Log in to the Confluent Cloud console
#
# You should now see the Confluent Cloud dashboard!
# ============================================================================

# ============================================================================
# STEP 2: CREATE A KAFKA CLUSTER
# ============================================================================
# 1. In the Confluent Cloud console, click "Create cluster"
# 2. Choose "Basic" cluster type (cheapest, perfect for development)
# 3. Select your cloud provider (AWS, GCP, or Azure)
# 4. Choose a region close to you (e.g., us-east-1)
# 5. Give your cluster a name (e.g., "carrace-cluster")
# 6. Click "Launch cluster"
# 7. Wait 2-5 minutes for the cluster to be ready
#
# Once ready, you'll see your cluster in the Environments > Clusters list
# ============================================================================

# ============================================================================
# STEP 3: GET YOUR BOOTSTRAP SERVER
# ============================================================================
# 1. Click on your cluster name
# 2. In the left sidebar, click "Cluster Overview" or "Cluster Settings"
# 3. Look for "Bootstrap server" - it looks like:
#    pkc-xxxxx.us-east-1.aws.confluent.cloud:9092
# 4. Copy this URL and paste it below (replace the example)
# ============================================================================

# ============================================================================
# STEP 3: GET YOUR BOOTSTRAP SERVER
# ============================================================================
# 1. Click on your cluster name
# 2. In the left sidebar, click "Cluster Overview" or "Cluster Settings"
# 3. Look for "Bootstrap server" - it looks like:
#    pkc-xxxxx.us-east-1.aws.confluent.cloud:9092
# 4. Copy this URL and add it to your .env file
# ============================================================================

# Load from environment variable (set in .env file)
spring.kafka.bootstrap-servers=${CONFLUENT_BOOTSTRAP_SERVERS}

# IMPORTANT: Create a .env file in the project root with your credentials!
# Copy .env.example to .env and fill in your values.
# The .env file is git-ignored to protect your secrets.
# ============================================================================


# ============================================================================
# STEP 4: CREATE AN API KEY AND SECRET
# ============================================================================
# API Keys are like username/password for your Kafka cluster
#
# 1. In your cluster view, click "API Keys" in the left sidebar
# 2. Click "Create key" or "+ Add key"
# 3. Choose "Global access" (simplest option)
# 4. Click "Next"
# 5. You'll see two values:
#    - API Key (looks like: ABCDEFGH12345678)
#    - API Secret (looks like: xyzABC123randomChars456)
# 
# ⚠️  IMPORTANT: Copy BOTH values NOW! The secret is only shown ONCE!
#    Save them somewhere safe (password manager, notepad, etc.)
#
# 6. Add them to your .env file (NOT here in this properties file!)
# ============================================================================

# Load from environment variables (set in .env file)
confluent.cloud.api.key=${CONFLUENT_API_KEY}
confluent.cloud.api.secret=${CONFLUENT_API_SECRET}

# IMPORTANT: Never commit your actual API keys to git!
# Always use the .env file which is git-ignored.
# ============================================================================


# ============================================================================
# STEP 5: CREATE TOPICS (OPTIONAL - Auto-created by default)
# ============================================================================
# The application will try to auto-create topics, but you can create them
# manually for better control:
#
# 1. In your cluster, click "Topics" in the left sidebar
# 2. Click "Create topic"
# 3. Create these 4 topics with default settings:
#    - race-events
#    - bet-events
#    - payout-events
#    - leaderboard-updates
# 4. Use default partitions (6) and retention (7 days)
#
# This step is OPTIONAL - topics will be created automatically if they
# don't exist when the app starts.
# ============================================================================

# ============================================================================
# KAFKA CONFIGURATION FOR CONFLUENT CLOUD
# ============================================================================
# Below are the technical settings needed for Confluent Cloud.
# You DON'T need to change these - they're already configured correctly!
# Just make sure you filled in the values above (bootstrap server, API key, secret)
# ============================================================================

# Security Protocol - Confluent Cloud requires SASL_SSL
spring.kafka.properties.security.protocol=SASL_SSL

# SASL Mechanism - Confluent Cloud uses PLAIN
spring.kafka.properties.sasl.mechanism=PLAIN

# SASL Configuration - Uses your API Key and Secret
# This line combines your API key and secret into the required format
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="${confluent.cloud.api.key}" \
  password="${confluent.cloud.api.secret}";

# ============================================================================
# CONSUMER CONFIGURATION
# ============================================================================
spring.kafka.consumer.group-id=carrace-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Configure delegate deserializers for error handling
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Allow the app to deserialize JSON objects
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=true

# Consumer security settings (same as main config)
spring.kafka.consumer.properties.security.protocol=SASL_SSL
spring.kafka.consumer.properties.sasl.mechanism=PLAIN
spring.kafka.consumer.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="${confluent.cloud.api.key}" \
  password="${confluent.cloud.api.secret}";

# ============================================================================
# PRODUCER CONFIGURATION
# ============================================================================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Add type information to messages for proper deserialization
spring.kafka.producer.properties.spring.json.add.type.headers=true

# Producer reliability settings
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# Producer security settings (same as main config)
spring.kafka.producer.properties.security.protocol=SASL_SSL
spring.kafka.producer.properties.sasl.mechanism=PLAIN
spring.kafka.producer.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="${confluent.cloud.api.key}" \
  password="${confluent.cloud.api.secret}";

# ============================================================================
# KAFKA STREAMS CONFIGURATION
# ============================================================================
# Kafka Streams is used for real-time leaderboard processing
spring.kafka.streams.application-id=carrace-leaderboard-streams

# CRITICAL: Streams needs explicit bootstrap server configuration
spring.kafka.streams.bootstrap-servers=${spring.kafka.bootstrap-servers}

spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde

# Streams security settings
spring.kafka.streams.properties.security.protocol=SASL_SSL
spring.kafka.streams.properties.sasl.mechanism=PLAIN
spring.kafka.streams.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="${confluent.cloud.api.key}" \
  password="${confluent.cloud.api.secret}";

# Performance tuning for cloud deployment
spring.kafka.streams.properties.num.stream.threads=2
spring.kafka.streams.properties.commit.interval.ms=1000

# ============================================================================
# ADMIN CONFIGURATION (for auto-creating topics)
# ============================================================================
spring.kafka.admin.properties.security.protocol=SASL_SSL
spring.kafka.admin.properties.sasl.mechanism=PLAIN
spring.kafka.admin.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="${confluent.cloud.api.key}" \
  password="${confluent.cloud.api.secret}";

# ============================================================================
# VERIFICATION CHECKLIST
# ============================================================================
# Before running the app, verify:
# ✅ You replaced the bootstrap server URL (step 3)
# ✅ You added your API key (step 4)
# ✅ You added your API secret (step 4)
# ✅ Your Confluent Cloud cluster is running (green status in console)
#
# To test your configuration:
# 1. Save this file
# 2. Run: mvn clean package
# 3. Run: java -jar target/carrace-1.0.0.jar --spring.profiles.active=confluent
# 4. Look for "Started CarRaceApplication" in the logs
# 5. Check Confluent Cloud console - you should see topics created
#
# If you see errors:
# - "Authentication failed" → Check your API key and secret
# - "Could not connect" → Check your bootstrap server URL
# - "Topic not found" → Topics will be created automatically, wait a moment
# ============================================================================

